{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-12 sm:my-20 bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-100">
    <div class="text-center mb-8">
        <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-900">Welcome Back</h2>
        <p class="text-sm text-gray-500 mt-1">Sign in to manage your listings and deals</p>
    </div>

    <form action="/login" method="POST" class="space-y-5">
        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Your Name</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                    <i class="fa-solid fa-user text-sm"></i>
                </span>
                <input type="text" name="name" required placeholder="Enter your registered name"
                    class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Password</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                    <i class="fa-solid fa-lock text-sm"></i>
                </span>
                <input type="password" name="password" required placeholder="Enter password"
                    class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
            </div>
        </div>

        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md shadow-blue-200 text-sm mt-2">
            Sign In
        </button>
    </form>

    <div class="text-center mt-6 pt-4 border-t border-gray-100">
        <p class="text-sm text-gray-600">New to CampusTrade? <a href="/register"
                class="text-blue-600 font-bold hover:underline">Create Account</a></p>
    </div>
</div>
{% endblock %}
