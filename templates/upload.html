{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto my-6 sm:my-12 bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-100">
    <div class="text-center mb-6">
        <span class="px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold uppercase tracking-widest rounded-full">New
            Listing</span>
        <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-900 mt-2">List Your {{ category }}</h2>
        <p class="text-sm text-gray-500 mt-1">Provide proper details and high-quality picture</p>
    </div>

    <form action="" method="POST" enctype="multipart/form-data" class="space-y-5">
        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Title / Item Name</label>
            <input type="text" name="title" required placeholder="e.g., Irodov Physics Book, Single Bed Room PG"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Expected Price
                    (INR)</label>
                <input type="number" name="price" required placeholder="e.g., 500"
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Target City /
                    Location</label>
                <input type="text" name="city" required placeholder="e.g., Kota, Delhi"
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition">
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Product
                Description</label>
            <textarea name="description" rows="3"
                placeholder="Describe items condition, timings, features, inclusions etc..."
                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition"></textarea>
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Upload Product
                Picture</label>
            <div
                class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl hover:border-blue-500 transition relative bg-gray-50/50">
                <div class="space-y-1 text-center">
                    <i class="fa-solid fa-images text-3xl text-gray-400 mb-2"></i>
                    <div class="flex text-sm text-gray-600 justify-center">
                        <label for="image-upload"
                            class="relative cursor-pointer bg-white rounded-md font-semibold text-blue-600 hover:text-blue-500 focus-within:outline-none">
                            <span>Upload a file</span>
                            <input id="image-upload" name="image" type="file" accept="image/*" class="sr-only"
                                onchange="validateAndPreview(this)">
                        </label>
                    </div>
                    <p class="text-xs text-gray-500">PNG, JPG, JPEG up to 5MB</p>
                    <p id="file-chosen" class="text-xs font-bold text-emerald-600 mt-2"></p>
                </div>
            </div>
        </div>

        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md shadow-blue-200 text-sm mt-2">
            Publish Ad Live
        </button>
    </form>
</div>

<script>
    function validateAndPreview(input) {
        const fileChosen = document.getElementById('file-chosen');

        if (input.files.length > 0) {
            const file = input.files[0];
            const fileSizeMB = file.size / (1024 * 1024);

            // 🔥 Strict Client-side 5MB limit validation
            if (fileSizeMB > 5) {
                alert("File size exceeds 5MB! Please select a smaller photo to ensure a smooth upload.");
                input.value = ""; // Clear selected file
                fileChosen.innerHTML = "";
                return;
            }

            fileChosen.innerHTML = `<i class="fa-solid fa-circle-check"></i> Selected: ${file.name}`;
        }
    }
</script>
{% endblock %}
