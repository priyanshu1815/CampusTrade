<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell an Item - CampusTrade</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            padding: 40px 20px;
            margin: 0;
        }

        .form-container {
            max-width: 550px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: #374151;
            font-size: 14px;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #f9fafb;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #1e3a8a;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        input[type="file"] {
            padding: 10px;
            background: #f3f4f6;
            border-radius: 8px;
            border: 1px dashed #9ca3af;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background-color: #10b981;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #059669;
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-back:hover {
            color: #1e3a8a;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>List Your Item For Sale 📦</h2>
        <p class="subtitle">Enter correct details so other students can buy quickly</p>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label>What are you selling? (Title)</label>
                <input type="text" name="title" placeholder="e.g., Godrej Study Chair, Wooden Table" required>
            </div>

            <div class="form-group">
                <label>Price (INR)</label>
                <input type="number" name="price" placeholder="e.g., 500" required>
            </div>

            <div class="form-group">
                <label>City / Campus Location</label>
                <input type="text" name="city" placeholder="e.g., Kota, Patna, Bhabua" required>
            </div>

            <div class="form-group">
                <label>Item Description (Condition, Usage period etc.)</label>
                <textarea name="description"
                    placeholder="Describe your item shortly... (e.g., 6 months old, excellent condition)" rows="4"
                    required></textarea>
            </div>

            <div class="form-group">
                <label>Upload Item Image 📸</label>
                <input type="file" name="image" accept="image/*" required>
            </div>

            <div class="form-group">
                <label>Your Contact Number (Kept Private)</label>
                <input type="text" name="phone" placeholder="e.g., 9876543210" required>
            </div>

            <button type="submit" class="btn-submit">Publish Item on Marketplace 🚀</button>
            <a href="/" class="btn-back">← Go Back to Home</a>
        </form>
    </div>

</body>

</html>
