<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>List Tiffin Service</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            padding: 40px 20px;
            margin: 0;
        }

        .form-container {
            max-width: 550px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            color: #1e3a8a;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            background-color: #10b981;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h2>List Your Tiffin Service / Mess 🍱</h2>
        <form action="/upload-tiffin" method="POST" enctype="multipart/form-data">
            <div class="form-group"><label>Mess / Tiffin Name</label><input type="text" name="service_name"
                    placeholder="e.g., Ghar Jaisa Khana Tiffin" required></div>
            <div class="form-group"><label>Price per Month (30 Days, 2 Times)</label><input type="number" name="price"
                    placeholder="e.g., 3000" required></div>
            <div class="form-group"><label>City</label><input type="text" name="city" required></div>
            <div class="form-group"><label>Menu Details (e.g., Rice, Dal, 2 Veg, Roti, Special on
                    Sunday)</label><textarea name="menu_details" rows="3" required></textarea></div>
            <div class="form-group"><label>Upload Banner/Food Image 📸</label><input type="file" name="image"
                    accept="image/*" required></div>
            <div class="form-group"><label>Contact Number for Orders</label><input type="text" name="phone" required>
            </div>
            <button type="submit" class="btn-submit">Publish Tiffin Service 🚀</button>
        </form>
    </div>
</body>

</html>
