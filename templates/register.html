{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-6 sm:my-12 bg-white p-6 sm:p-8 rounded-2xl shadow-xl border border-gray-100">
    <div class="text-center mb-6">
        <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-900">Create Account</h2>
        <p class="text-sm text-gray-500 mt-1">Join CampusTrade community today</p>
    </div>

    <form action="/register" method="POST" class="space-y-4">

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Sign Up As:</label>
            <div class="grid grid-cols-2 gap-4 mt-1">
                <label id="student-label"
                    class="flex items-center justify-center p-3 rounded-xl border cursor-pointer hover:bg-gray-50 transition border-blue-500 bg-blue-50/50">
                    <input type="radio" name="role" value="Student" checked onchange="toggleFields()"
                        class="mr-2 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm font-semibold text-gray-700">Student</span>
                </label>
                <label id="owner-label"
                    class="flex items-center justify-center p-3 rounded-xl border cursor-pointer hover:bg-gray-50 transition border-gray-200">
                    <input type="radio" name="role" value="Owner" onchange="toggleFields()"
                        class="mr-2 text-blue-600 focus:ring-blue-500">
                    <span class="text-sm font-semibold text-gray-700">Vendor / Seller</span>
                </label>
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Full Name</label>
            <input type="text" name="name" required placeholder="Enter full name"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Mobile Number</label>
            <input type="tel" name="mobile" required placeholder="Enter 10 digit number"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
        </div>

        <div id="student-only-fields" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">University / College
                    / School</label>
                <input type="text" name="university_name" id="university_name" required
                    placeholder="e.g., IIT Delhi, BHU, LPU"
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Course /
                    Class</label>
                <input type="text" name="course_name" id="course_name" required
                    placeholder="e.g., B.Tech CSE, MBA, Class 12"
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">City (In India)</label>
            <input type="text" name="city" required placeholder="e.g., Delhi, Pune, Kota"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Password</label>
            <input type="password" name="password" required placeholder="Create strong password"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition">
        </div>

        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md shadow-blue-200 text-sm mt-2">
            Sign Up
        </button>
    </form>

    <div class="text-center mt-6 pt-4 border-t border-gray-100">
        <p class="text-sm text-gray-600">Already have an account? <a href="/login"
                class="text-blue-600 font-bold hover:underline">Sign In</a></p>
    </div>
</div>

<script>
    function toggleFields() {
        const role = document.querySelector('input[name="role"]:checked').value;
        const studentFields = document.getElementById('student-only-fields');
        const uniInput = document.getElementById('university_name');
        const courseInput = document.getElementById('course_name');

        const studentLabel = document.getElementById('student-label');
        const ownerLabel = document.getElementById('owner-label');

        if (role === 'Student') {
            studentFields.style.display = 'block';
            uniInput.required = true;
            courseInput.required = true;

            studentLabel.className = "flex items-center justify-center p-3 rounded-xl border cursor-pointer hover:bg-gray-50 transition border-blue-500 bg-blue-50/50";
            ownerLabel.className = "flex items-center justify-center p-3 rounded-xl border cursor-pointer hover:bg-gray-50 transition border-gray-200";
        } else {
            studentFields.style.display = 'none';
            uniInput.required = false;
            courseInput.required = false;
            uniInput.value = '';
            courseInput.value = '';

            ownerLabel.className = "flex items-center justify-center p-3 rounded-xl border cursor-pointer hover:bg-gray-50 transition border-blue-500 bg-blue-50/50";
            studentLabel.className = "flex items-center justify-center p-3 rounded-xl border cursor-pointer hover:bg-gray-50 transition border-gray-200";
        }
    }
    window.onload = toggleFields;
</script>
{% endblock %}
